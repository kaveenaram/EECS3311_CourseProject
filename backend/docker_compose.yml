version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"

  backend:
    build: .
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "mysql+pymysql://user:password@db:3306/mydatabase"
    depends_on:
      - db