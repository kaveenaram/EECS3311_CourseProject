  #    test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
   #   timeout: 20s
    #  retries: 10
  #  networks:
   #   - app-network
    #

  # Python Backend
  backend:
    build: ./backend
    environment:
      - FLASK_APP=api:app
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    command: python -m flask run --host=0.0.0.0
    ports:
      - "5001:5000"
    networks:
      - app-network

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_API_URL: http://backend:5000
    environment:
      REACT_APP_API_URL: http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  db_data:
    driver: local

networks:
  app-network:
    driver: bridge