version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: consulting_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: Team9-ConsultingService
      MYSQL_USER: team9user
      MYSQL_PASSWORD: Team9Password123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: backend_api
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: mysql+pymysql://team9user:Team9Password123@db:3306/Team9-ConsultingService
      FLASK_ENV: development
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://backend:5000
    container_name: frontend_app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:5000
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge